version: '3.8'

# Production Docker Compose
# For cloud deployments, replace PostgreSQL/Redis with managed services
# and configure via environment variables.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# With managed database (e.g., AWS RDS, GCP Cloud SQL):
#   Set DATABASE_URL to managed instance connection string
#   Remove or comment out the postgres service
#
# With managed Redis (e.g., AWS ElastiCache, GCP Memorystore):
#   Set REDIS_HOST to managed instance endpoint
#   Remove or comment out the redis service

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: enterprise-backend-prod
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - APP_PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/enterprise_db?schema=public}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-12}
      - EMAIL_VERIFICATION_ENABLED=${EMAIL_VERIFICATION_ENABLED:-true}
      - MAIL_ENABLED=${MAIL_ENABLED:-true}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - STORAGE_TYPE=${STORAGE_TYPE:-s3}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_CDN_URL=${S3_CDN_URL:-}
      - MONITORING_ENABLED=${MONITORING_ENABLED:-true}
      - MONITORING_PROVIDER=${MONITORING_PROVIDER:-sentry}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DATADOG_API_KEY=${DATADOG_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: ${APP_REPLICAS:-2}
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-postgres-prod
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: bridge
